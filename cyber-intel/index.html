<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vendor Security Scorecard — THE WANG REPORT</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:#0d0d14;color:#ccc;font-family:Georgia,'Times New Roman',serif;font-size:14px;line-height:1.4}
body{background:#0d0d14;min-height:100vh}
a{color:#c9a84c;text-decoration:none}
a:hover{text-decoration:underline}

/* NAV */
.nav-bar{text-align:center;padding:10px 12px;background:#111;border-bottom:1px solid #333;font-family:Impact,'Arial Narrow',sans-serif;font-size:13px;letter-spacing:1px}
.nav-bar a{color:#888;margin:0 6px;text-decoration:none}
.nav-bar a:hover,.nav-bar a.nav-active{color:#c9a84c}

/* WRAPPER */
.wrap{max-width:1200px;margin:0 auto;padding:16px 12px 40px}

/* HEADER */
.page-header{text-align:center;margin-bottom:24px;border-bottom:1px solid #222;padding-bottom:16px}
.page-header h1{font-family:Impact,'Arial Narrow',sans-serif;font-size:32px;color:#c9a84c;letter-spacing:2px;margin-bottom:4px}
.page-header .sub{font-size:12px;color:#666}
.page-header .meta-line{font-size:11px;color:#555;margin-top:4px}
.ciso-toggle-wrap{margin-top:8px}
.ciso-toggle{background:#1a0a0a;border:1px solid #aa1a1a;color:#ee3a3a;font-family:Impact,sans-serif;font-size:12px;letter-spacing:1px;padding:6px 14px;cursor:pointer;border-radius:2px}
.ciso-toggle.active{background:#3a0a0a;border-color:#ee3a3a;animation:cisoPulse 1.5s infinite}
@keyframes cisoPulse{0%,100%{box-shadow:0 0 4px #aa1a1a}50%{box-shadow:0 0 12px #ee3a3a}}
.ciso-banner{display:none;font-family:Impact,sans-serif;font-size:14px;color:#ee3a3a;letter-spacing:2px;margin-top:6px}
.ciso-banner.show{display:block}

/* FILTER BAR */
.filter-bar{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-bottom:20px;padding:10px;background:#111;border:1px solid #1a1a1a;border-radius:4px}
.sector-pill{font-family:Impact,sans-serif;font-size:11px;letter-spacing:0.5px;padding:4px 10px;border:1px solid #333;background:#1a1a1a;color:#888;cursor:pointer;border-radius:2px;transition:all .15s}
.sector-pill:hover{border-color:#666;color:#ccc}
.sector-pill.active{border-color:#c9a84c;color:#c9a84c;background:#1a1808}
.sort-select{margin-left:auto;background:#1a1a1a;border:1px solid #333;color:#aaa;font-family:Impact,sans-serif;font-size:11px;letter-spacing:0.5px;padding:4px 8px;border-radius:2px;cursor:pointer}

/* CARD GRID */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:20px}

/* EMPTY STATE */
.empty-state{grid-column:1/-1;text-align:center;padding:40px;color:#555;font-family:Impact,sans-serif;font-size:16px;letter-spacing:1px}

/* MARVEL CARD */
.marvel-card{background:#111;border:1px solid #2a2a2a;border-radius:3px;cursor:pointer;transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden;outline:none}
.marvel-card:hover,.marvel-card:focus{transform:translateY(-4px);box-shadow:0 6px 20px rgba(0,0,0,.5)}
.marvel-card.wr-featured{border-color:#c9a84c}

/* WR FEATURED CORNER BADGE */
.wr-badge{position:absolute;top:0;right:0;z-index:5;width:70px;height:70px;overflow:hidden;pointer-events:none}
.wr-badge span{display:block;position:absolute;top:10px;right:-22px;width:90px;text-align:center;font-family:Impact,sans-serif;font-size:8px;letter-spacing:0.5px;color:#1a1208;background:linear-gradient(90deg,#c9a84c,#e8d48a,#c9a84c);transform:rotate(45deg);padding:2px 0;clip-path:polygon(0 0,100% 0,100% 100%,0 100%)}

/* HOLO OVERLAY */
.holo-wrap{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .3s;z-index:4;border-radius:3px;overflow:hidden}
.marvel-card.wr-featured:hover .holo-wrap,.marvel-card.wr-featured:focus .holo-wrap{opacity:1}
.holo-layer{position:absolute;inset:0;background:linear-gradient(115deg,transparent 20%,rgba(255,50,50,.12) 30%,rgba(255,165,0,.12) 38%,rgba(255,255,0,.1) 44%,rgba(0,255,0,.1) 50%,rgba(0,200,255,.12) 56%,rgba(100,100,255,.12) 62%,rgba(200,50,255,.1) 70%,transparent 80%);background-size:200% 200%;animation:holoShift 3s ease infinite;mix-blend-mode:screen}
.holo-lines{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.03) 2px,rgba(255,255,255,.03) 4px);animation:holoShift 5s linear infinite reverse}
.holo-wr-badge{position:absolute;bottom:8px;right:8px;width:28px;height:28px;border:2px solid rgba(201,168,76,.4);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:Impact,sans-serif;font-size:8px;color:rgba(201,168,76,.6);animation:holoSpin 4s linear infinite}
@keyframes holoShift{0%{background-position:0% 0%}50%{background-position:100% 100%}100%{background-position:0% 0%}}
@keyframes holoSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* CARD: TOP BANNER */
.card-banner{background:linear-gradient(90deg,#1a1208,#2a1a08);padding:4px 8px;font-family:Impact,sans-serif;font-size:8px;color:#7a6a3a;letter-spacing:1px;display:flex;justify-content:space-between;border-bottom:1px solid #c9a84c}

/* CARD: ART AREA */
.card-art{height:110px;display:flex;align-items:center;justify-content:center;position:relative}
.card-monogram{font-family:Impact,'Arial Narrow',sans-serif;font-size:72px;letter-spacing:2px;opacity:.85}
.grade-seal{position:absolute;top:8px;left:8px;width:32px;height:32px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-family:Impact,sans-serif;font-size:14px;font-weight:bold}
.grade-A{background:#1a3a1a;border-color:#5a9a3a;color:#8acc5a}
.grade-B{background:#1a2a3a;border-color:#3a6aaa;color:#6aaaee}
.grade-C{background:#3a2a0a;border-color:#aa7a1a;color:#eaaa3a}
.grade-D{background:#3a1a0a;border-color:#aa4a1a;color:#ee7a3a}
.grade-F{background:#3a0a0a;border-color:#aa1a1a;color:#ee3a3a}

/* CARD: NAME PLATE */
.card-nameplate{background:linear-gradient(90deg,#2a1a08,#1a1208);padding:6px 8px;border-top:1px solid #3a2a0a}
.card-nameplate .vname{font-family:Impact,sans-serif;font-size:13px;text-transform:uppercase;color:#c9a84c;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-nameplate .vsector{font-size:9px;color:#7a6a3a;text-transform:uppercase;letter-spacing:0.5px}

/* CARD: STATS */
.card-stats{padding:8px;background:#0d0d14}
.stat-row{display:flex;align-items:center;margin-bottom:3px}
.stat-label{font-family:Impact,sans-serif;font-size:8px;color:#666;width:62px;text-transform:uppercase;letter-spacing:0.3px;flex-shrink:0}
.stat-bar-bg{flex:1;height:8px;background:#1a1a1a;border-radius:1px;overflow:hidden}
.stat-bar-fill{height:100%;border-radius:1px;transition:width .4s}
.bar-green{background:#5a9a3a}
.bar-blue{background:#3a6aaa}
.bar-amber{background:#aa7a1a}
.bar-red{background:#aa1a1a}

/* CARD: FACTS STRIP */
.card-facts{padding:4px 8px;background:#0a0a10;display:grid;grid-template-columns:repeat(5,1fr);gap:2px;border-top:1px solid #1a1a1a}
.fact{text-align:center}
.fact .fval{font-family:Impact,sans-serif;font-size:11px;color:#ccc}
.fact .flbl{font-size:7px;color:#555;text-transform:uppercase;letter-spacing:0.3px}

/* CARD: WR TAKE */
.card-take{padding:6px 8px;background:#0d0d14;border-top:1px solid #1a1a1a;font-size:10px;font-style:italic;color:#7a6a3a;line-height:1.3;max-height:48px;overflow:hidden}
.card-take.empty{color:#333;font-style:normal}

/* CARD: FOOTER */
.card-footer{display:flex;justify-content:space-between;align-items:center;padding:4px 8px;background:#111;border-top:1px solid #1a1a1a;font-family:Impact,sans-serif;font-size:8px;letter-spacing:0.5px}
.kev-badge{padding:2px 6px;border-radius:1px;font-size:8px;letter-spacing:0.5px}
.kev-active{background:#3a0a0a;color:#ee3a3a;border:1px solid #aa1a1a}
.kev-clear{background:#1a3a1a;color:#5a9a3a;border:1px solid #3a6a3a}

/* DRILL-DOWN PANEL */
.drill-down{display:none;max-width:700px;margin:20px auto;padding:0;border:2px solid #c9a84c;background:#1a1208;border-radius:4px;position:relative}
.drill-down.open{display:block}
.drill-close{position:absolute;top:8px;right:12px;background:none;border:none;color:#c9a84c;font-size:20px;cursor:pointer;z-index:10;font-family:Georgia,serif}

/* MTG TITLE BAR */
.mtg-title{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:linear-gradient(90deg,#2a1a08,#1a1208);border-bottom:1px solid #3a2a0a}
.mtg-title .mtg-name{font-family:Impact,sans-serif;font-size:20px;color:#c9a84c;letter-spacing:1px;text-transform:uppercase}
.mana-cost{display:flex;gap:3px}
.mana-pip{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:Impact,sans-serif;font-size:10px;font-weight:bold;border:1px solid rgba(255,255,255,.2)}
.mana-W{background:#f0e6c0;color:#222}
.mana-U{background:#0e6eb8;color:#fff}
.mana-B{background:#222;color:#aaa;border-color:#555}
.mana-R{background:#c33;color:#fff}
.mana-G{background:#0a6;color:#fff}

/* MTG ART */
.mtg-art{height:120px;display:flex;align-items:center;justify-content:center}
.mtg-art .big-mono{font-family:Impact,sans-serif;font-size:64px;letter-spacing:3px;opacity:.85}

/* MTG TYPE LINE */
.mtg-type{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;background:#12100a;border-top:1px solid #3a2a0a;border-bottom:1px solid #3a2a0a;font-family:Impact,sans-serif;font-size:12px;color:#c9a84c;letter-spacing:0.5px}
.rarity-gem{width:14px;height:14px;border-radius:50%;display:inline-block;vertical-align:middle}
.rarity-mythic{background:conic-gradient(#c9a84c,#e8d48a,#c9a84c,#e8d48a);animation:holoSpin 3s linear infinite}
.rarity-rare{background:linear-gradient(135deg,#c9a84c,#e8d48a)}
.rarity-uncommon{background:linear-gradient(135deg,#888,#bbb)}
.rarity-common{background:#333}

/* MTG TEXT BOX */
.mtg-textbox{padding:10px 12px;background:#14120a;min-height:80px;font-size:12px;color:#bba860;line-height:1.5}
.mtg-textbox .ability{margin-bottom:4px}
.mtg-textbox .flavor{font-style:italic;color:#8a7a40;border-top:1px solid #2a2008;padding-top:6px;margin-top:6px;font-size:11px}

/* RRR STRIP */
.rrr-strip{display:flex;gap:8px;padding:6px 12px;background:#12100a;border-top:1px solid #3a2a0a;font-family:Impact,sans-serif;font-size:11px;color:#888}
.rrr-pip{display:inline-block;width:14px;height:14px;border-radius:50%;text-align:center;line-height:14px;font-size:9px;margin-right:2px;border:1px solid rgba(255,255,255,.1)}
.rrr-A{background:#1a3a1a;color:#8acc5a}
.rrr-B{background:#1a2a3a;color:#6aaaee}
.rrr-C{background:#3a2a0a;color:#eaaa3a}
.rrr-D{background:#3a1a0a;color:#ee7a3a}
.rrr-F{background:#3a0a0a;color:#ee3a3a}
.rrr-null{background:#1a1a1a;color:#444}

/* MTG BOTTOM BAR */
.mtg-bottom{display:flex;justify-content:space-between;padding:6px 12px;background:linear-gradient(90deg,#2a1a08,#1a1208);border-top:1px solid #3a2a0a;font-family:Impact,sans-serif;font-size:10px;color:#7a6a3a;letter-spacing:0.5px}

/* CVE TABLE */
.cve-table-wrap{max-width:700px;margin:12px auto 30px;background:#111;border:1px solid #2a2a2a;border-radius:3px;overflow-x:auto}
.cve-table-wrap.hidden{display:none}
.cve-table{width:100%;border-collapse:collapse;font-size:11px}
.cve-table th{background:#1a1208;color:#c9a84c;font-family:Impact,sans-serif;font-size:10px;letter-spacing:0.5px;padding:6px 8px;text-align:left;border-bottom:1px solid #3a2a0a}
.cve-table td{padding:5px 8px;border-bottom:1px solid #1a1a1a;vertical-align:top}
.cve-table tr:hover td{background:#151515}
.cve-table a{color:#6aaaee}
.sev-pill{display:inline-block;padding:1px 6px;border-radius:2px;font-family:Impact,sans-serif;font-size:9px;letter-spacing:0.5px}
.sev-CRITICAL{background:#3a0a0a;color:#ee3a3a;border:1px solid #aa1a1a}
.sev-HIGH{background:#3a1a0a;color:#ee7a3a;border:1px solid #aa4a1a}
.sev-MEDIUM{background:#3a2a0a;color:#eaaa3a;border:1px solid #aa7a1a}
.sev-LOW{background:#1a2a3a;color:#6aaaee;border:1px solid #3a6aaa}
.cve-badge{display:inline-block;padding:1px 4px;border-radius:2px;font-family:Impact,sans-serif;font-size:8px;letter-spacing:0.3px;margin-left:3px}
.badge-kev{background:#3a0a0a;color:#ee3a3a;border:1px solid #aa1a1a}
.badge-zday{background:#3a2a0a;color:#eaaa3a;border:1px solid #aa7a1a}

/* FOOTER */
.page-footer{text-align:center;padding:20px 12px;border-top:1px solid #222;margin-top:30px;font-size:10px;color:#444}
.page-footer a{color:#666;margin:0 6px}

/* LEGEND */
.legend{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-bottom:12px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:#666}
.legend-swatch{width:12px;height:8px;border-radius:1px}

@media(max-width:600px){
  .card-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}
  .filter-bar{gap:4px}
  .sector-pill{font-size:10px;padding:3px 6px}
}
</style>
</head>

<script>
(function(){
'use strict';

var SECTOR_ART = {
  endpoint: {bg:'linear-gradient(160deg,#0d1a2e,#1a3a5a)',mono:'#60aaff'},
  network:  {bg:'linear-gradient(160deg,#0d1a14,#1a3a2a)',mono:'#60ddaa'},
  cloud:    {bg:'linear-gradient(160deg,#14100d,#2a2010)',mono:'#ddaa60'},
  identity: {bg:'linear-gradient(160deg,#1a0d2e,#2a1a4a)',mono:'#aa88ff'},
  siem:     {bg:'linear-gradient(160deg,#1a1a0d,#2a2a14)',mono:'#dddd60'},
  ot:       {bg:'linear-gradient(160deg,#2a0d0d,#3a1a1a)',mono:'#ff8866'},
  devops:   {bg:'linear-gradient(160deg,#0d2a1a,#1a3a2a)',mono:'#66dd88'},
  backup:   {bg:'linear-gradient(160deg,#1a1a2a,#2a2a3a)',mono:'#aaaadd'},
  email:    {bg:'linear-gradient(160deg,#0d1a2a,#1a2a3a)',mono:'#88aadd'},
  iam:      {bg:'linear-gradient(160deg,#2a0d2a,#3a1a3a)',mono:'#dd88dd'},
  erp:      {bg:'linear-gradient(160deg,#2a1a0d,#3a2a1a)',mono:'#ddaa88'},
  itsm:     {bg:'linear-gradient(160deg,#0d2a2a,#1a3a3a)',mono:'#88dddd'},
  payments: {bg:'linear-gradient(160deg,#1a2a0d,#2a3a1a)',mono:'#aadd88'},
  healthcare:{bg:'linear-gradient(160deg,#0d1a1a,#1a2a2a)',mono:'#66cccc'},
  insurance:{bg:'linear-gradient(160deg,#1a0d1a,#2a1a2a)',mono:'#cc88cc'}
};

var SECTOR_ELEMENT = {
  endpoint:'U', network:'G', cloud:'W', identity:'U', siem:'B',
  ot:'R', devops:'G', backup:'W', email:'U', erp:'W',
  itsm:'G', payments:'W', healthcare:'W', insurance:'W', iam:'U'
};

var GRADE_VAL = {A:95, B:80, C:60, D:35, F:10};

var SECTOR_LABELS = {
  endpoint:'Endpoint',network:'Network',cloud:'Cloud',identity:'Identity',siem:'SIEM',
  ot:'OT/ICS',devops:'DevOps',backup:'Backup',email:'Email',iam:'IAM',erp:'ERP',
  itsm:'ITSM',payments:'Payments',healthcare:'Healthcare',insurance:'Insurance'
};

var DATA = null;
var currentSector = 'all';
var currentSort = 'grade';
var cisoMode = false;
var openVendorId = null;

function barColor(v) {
  if (v >= 70) return 'bar-green';
  if (v >= 50) return 'bar-blue';
  if (v >= 35) return 'bar-amber';
  return 'bar-red';
}

function calcStats(v) {
  var patchVel = Math.max(0, Math.min(100, 100 - (v.mttp_days / 90 * 100)));
  var disc = v.rrr_respond ? GRADE_VAL[v.rrr_respond] : v.score;
  var resil = v.rrr_resilient ? GRADE_VAL[v.rrr_resilient] : v.score;
  var cvePost = v.score;
  var concMap = {Leader:65, Challenger:40, Niche:20};
  var conc = concMap[v.market_position] || 20;
  return [
    {label:'Patch Vel', val:Math.round(patchVel)},
    {label:'Disclosure', val:Math.round(disc)},
    {label:'Resilience', val:Math.round(resil)},
    {label:'CVE Post', val:Math.round(cvePost)},
    {label:'Conc. Risk', val:Math.round(conc)}
  ];
}

function rrrGrade(g) {
  if (!g) return '<span class="rrr-pip rrr-null">-</span>';
  return '<span class="rrr-pip rrr-' + g + '">' + g + '</span>';
}

function esc(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function buildCard(v) {
  var art = SECTOR_ART[v.sector] || SECTOR_ART.endpoint;
  var stats = calcStats(v);
  var featured = v.wr_featured;
  var html = '<div class="marvel-card' + (featured ? ' wr-featured' : '') + '" tabindex="0" data-id="' + v.id + '">';
  if (featured) {
    html += '<div class="wr-badge"><span>WR FEATURED</span></div>';
    html += '<div class="holo-wrap"><div class="holo-layer"></div><div class="holo-lines"></div><div class="holo-wr-badge">WR</div></div>';
  }
  html += '<div class="card-banner"><span>CYBER INTEL &middot; WANG REPORT</span><span>' + esc(v.serial) + '</span></div>';
  html += '<div class="card-art" style="background:' + art.bg + '">';
  html += '<span class="card-monogram" style="color:' + art.mono + '">' + esc(v.monogram) + '</span>';
  html += '<span class="grade-seal grade-' + v.grade + '">' + v.grade + '</span>';
  html += '</div>';
  html += '<div class="card-nameplate"><div class="vname">' + esc(v.name) + '</div><div class="vsector">' + esc(SECTOR_LABELS[v.sector] || v.sector) + ' &middot; Tier ' + v.tier + ' &middot; ' + esc(v.market_position) + '</div></div>';
  html += '<div class="card-stats">';
  for (var i = 0; i < stats.length; i++) {
    var s = stats[i];
    html += '<div class="stat-row"><span class="stat-label">' + s.label + '</span><div class="stat-bar-bg"><div class="stat-bar-fill ' + barColor(s.val) + '" style="width:' + s.val + '%"></div></div></div>';
  }
  html += '</div>';
  html += '<div class="card-facts">';
  html += '<div class="fact"><div class="fval">' + v.cves_12m + '</div><div class="flbl">CVEs</div></div>';
  html += '<div class="fact"><div class="fval">' + v.kev_count + '</div><div class="flbl">CISA KEV</div></div>';
  html += '<div class="fact"><div class="fval">' + v.mttp_days + 'd</div><div class="flbl">Avg Patch</div></div>';
  html += '<div class="fact"><div class="fval">' + v.zero_days + '</div><div class="flbl">Zero-days</div></div>';
  html += '<div class="fact"><div class="fval">' + (v.rrr_react||'-') + '/' + (v.rrr_respond||'-') + '/' + (v.rrr_resilient||'-') + '</div><div class="flbl">RRR</div></div>';
  html += '</div>';
  if (featured && v.wr_take) {
    html += '<div class="card-take">' + esc(v.wr_take) + '</div>';
  } else {
    html += '<div class="card-take empty">No WR editorial</div>';
  }
  html += '<div class="card-footer">';
  if (v.kev_count > 0) {
    html += '<span class="kev-badge kev-active">KEV ACTIVE (' + v.kev_count + ')</span>';
  } else {
    html += '<span class="kev-badge kev-clear">KEV CLEAR</span>';
  }
  html += '<span style="color:#555">' + esc(v.serial) + '</span>';
  html += '</div>';
  html += '</div>';
  return html;
}

function buildDrillDown(v) {
  var art = SECTOR_ART[v.sector] || SECTOR_ART.endpoint;
  var el = SECTOR_ELEMENT[v.sector] || 'W';
  var baseCost = v.tier === 1 ? 4 : v.tier === 2 ? 3 : 2;
  var highRisk = v.grade === 'D' || v.grade === 'F';
  if (highRisk) baseCost += 1;

  var manaHtml = '';
  for (var i = 0; i < baseCost; i++) {
    var m = el;
    if (highRisk && i < 2) m = el;
    manaHtml += '<span class="mana-pip mana-' + m + '">' + m + '</span>';
  }

  var rarity = v.wr_featured ? 'mythic' : (v.tier === 1 ? 'rare' : (v.tier === 2 ? 'uncommon' : 'common'));
  var rarityLabel = rarity.charAt(0).toUpperCase() + rarity.slice(1);
  var sectorLabel = SECTOR_LABELS[v.sector] || v.sector;

  var html = '<button class="drill-close" title="Close">&times;</button>';
  html += '<div class="mtg-title"><span class="mtg-name">' + esc(v.name) + '</span><div class="mana-cost">' + manaHtml + '</div></div>';
  html += '<div class="mtg-art" style="background:' + art.bg + '"><span class="big-mono" style="color:' + art.mono + '">' + esc(v.monogram) + '</span></div>';
  html += '<div class="mtg-type"><span>Legendary Artifact &mdash; ' + esc(sectorLabel) + ' Security</span><span class="rarity-gem rarity-' + rarity + '" title="' + rarityLabel + '"></span></div>';

  html += '<div class="mtg-textbox">';
  html += '<div class="ability">Patch velocity: ' + v.mttp_days + ' days mean-time-to-patch across ' + v.cves_12m + ' CVEs in trailing 12 months.</div>';
  html += '<div class="ability">' + v.critical_count + ' critical-severity vulnerabilities. ' + v.zero_days + ' zero-day(s) observed. ' + v.kev_count + ' CISA KEV listing(s).</div>';
  html += '<div class="ability">Market position: ' + esc(v.market_position) + ' (Tier ' + v.tier + '). Concentration risk factor: ' + (v.market_position === 'Leader' ? 'HIGH' : v.market_position === 'Challenger' ? 'MODERATE' : 'LOW') + '.</div>';
  if (v.wr_take) {
    html += '<div class="flavor">' + esc(v.wr_take) + '</div>';
  }
  html += '</div>';

  html += '<div class="rrr-strip">';
  html += '<span>React: ' + rrrGrade(v.rrr_react) + '</span>';
  html += '<span>Respond: ' + rrrGrade(v.rrr_respond) + '</span>';
  html += '<span>Resilient: ' + rrrGrade(v.rrr_resilient) + '</span>';
  html += '</div>';

  html += '<div class="mtg-bottom"><span>' + esc(v.serial) + ' &middot; ' + esc(sectorLabel) + '</span><span>Score ' + v.score + ' &middot; Grade ' + v.grade + '</span></div>';

  var cveHtml = '';
  if (v.cve_list && v.cve_list.length > 0) {
    cveHtml = '<table class="cve-table"><thead><tr><th>CVE ID</th><th>Severity</th><th>Description</th><th>Days</th><th>Flags</th></tr></thead><tbody>';
    for (var j = 0; j < v.cve_list.length; j++) {
      var c = v.cve_list[j];
      cveHtml += '<tr>';
      cveHtml += '<td><a href="https://nvd.nist.gov/vuln/detail/' + esc(c.id) + '" target="_blank" rel="noopener">' + esc(c.id) + '</a></td>';
      cveHtml += '<td><span class="sev-pill sev-' + c.severity + '">' + c.severity + '</span></td>';
      cveHtml += '<td style="color:#999">' + esc(c.description) + '</td>';
      cveHtml += '<td style="text-align:center;color:#ccc">' + c.days_to_patch + '</td>';
      cveHtml += '<td>';
      if (c.kev) cveHtml += '<span class="cve-badge badge-kev">KEV</span>';
      if (c.zero_day) cveHtml += '<span class="cve-badge badge-zday">0DAY</span>';
      cveHtml += '</td>';
      cveHtml += '</tr>';
    }
    cveHtml += '</tbody></table>';
  }

  return {panel: html, cve: cveHtml};
}

function sortVendors(vendors) {
  var copy = vendors.slice();
  var gradeOrd = {A:5, B:4, C:3, D:2, F:1};
  switch (currentSort) {
    case 'grade':
      copy.sort(function(a,b){ return (gradeOrd[b.grade]||0) - (gradeOrd[a.grade]||0) || b.score - a.score; });
      break;
    case 'mttp':
      copy.sort(function(a,b){ return a.mttp_days - b.mttp_days; });
      break;
    case 'cves':
      copy.sort(function(a,b){ return b.cves_12m - a.cves_12m; });
      break;
    case 'kev':
      copy.sort(function(a,b){ return b.kev_count - a.kev_count; });
      break;
    case 'zerodays':
      copy.sort(function(a,b){ return b.zero_days - a.zero_days; });
      break;
    case 'score':
      copy.sort(function(a,b){ return b.score - a.score; });
      break;
  }
  return copy;
}

function filterVendors() {
  if (!DATA) return [];
  var list = DATA.vendors;
  if (currentSector !== 'all') {
    list = list.filter(function(v){ return v.sector === currentSector; });
  }
  if (cisoMode) {
    list = list.filter(function(v){ return v.kev_count > 0 || v.zero_days > 0; });
  }
  return sortVendors(list);
}

function render() {
  var grid = document.getElementById('cardGrid');
  var vendors = filterVendors();
  if (vendors.length === 0) {
    grid.innerHTML = '<div class="empty-state">No vendors match this filter</div>';
  } else {
    grid.innerHTML = vendors.map(buildCard).join('');
  }
  closeDrillDown();
  bindCards();
}

function closeDrillDown() {
  openVendorId = null;
  document.getElementById('drillDown').className = 'drill-down';
  document.getElementById('drillDown').innerHTML = '';
  document.getElementById('cveWrap').className = 'cve-table-wrap hidden';
  document.getElementById('cveWrap').innerHTML = '';
}

function openDrillDown(vendorId) {
  var v = DATA.vendors.find(function(x){ return x.id === vendorId; });
  if (!v) return;
  if (openVendorId === vendorId) { closeDrillDown(); return; }
  openVendorId = vendorId;
  var dd = buildDrillDown(v);
  var panel = document.getElementById('drillDown');
  panel.innerHTML = dd.panel;
  panel.className = 'drill-down open';
  var cveWrap = document.getElementById('cveWrap');
  if (dd.cve) {
    cveWrap.innerHTML = dd.cve;
    cveWrap.className = 'cve-table-wrap';
  } else {
    cveWrap.className = 'cve-table-wrap hidden';
    cveWrap.innerHTML = '';
  }
  panel.querySelector('.drill-close').addEventListener('click', closeDrillDown);
  panel.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function bindCards() {
  var cards = document.querySelectorAll('.marvel-card');
  for (var i = 0; i < cards.length; i++) {
    (function(card){
      card.addEventListener('click', function(){ openDrillDown(card.dataset.id); });
      card.addEventListener('keydown', function(e){
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openDrillDown(card.dataset.id); }
      });
    })(cards[i]);
  }
}

function buildFilters() {
  var bar = document.getElementById('filterBar');
  var seen = {};
  var sectors = [];
  for (var i = 0; i < DATA.vendors.length; i++) {
    var s = DATA.vendors[i].sector;
    if (!seen[s]) { seen[s] = true; sectors.push(s); }
  }
  for (var j = 0; j < sectors.length; j++) {
    var pill = document.createElement('span');
    pill.className = 'sector-pill';
    pill.dataset.sector = sectors[j];
    pill.textContent = (SECTOR_LABELS[sectors[j]] || sectors[j]).toUpperCase();
    bar.appendChild(pill);
  }

  var sel = document.createElement('select');
  sel.className = 'sort-select';
  sel.innerHTML = '<option value="grade">Sort: Grade</option><option value="mttp">Sort: MTTP (fastest)</option><option value="cves">Sort: CVE count</option><option value="kev">Sort: KEV count</option><option value="zerodays">Sort: Zero-days</option><option value="score">Sort: Score</option>';
  bar.appendChild(sel);

  bar.addEventListener('click', function(e) {
    if (e.target.classList.contains('sector-pill')) {
      var pills = bar.querySelectorAll('.sector-pill');
      for (var k = 0; k < pills.length; k++) pills[k].classList.remove('active');
      e.target.classList.add('active');
      currentSector = e.target.dataset.sector;
      render();
    }
  });

  sel.addEventListener('change', function() {
    currentSort = sel.value;
    render();
  });
}

function initCiso() {
  cisoMode = sessionStorage.getItem('cisoMode') === 'true';
  var btn = document.getElementById('cisoBtn');
  var banner = document.getElementById('cisoBanner');
  function updateCiso() {
    if (cisoMode) {
      btn.classList.add('active');
      banner.classList.add('show');
    } else {
      btn.classList.remove('active');
      banner.classList.remove('show');
    }
    sessionStorage.setItem('cisoMode', String(cisoMode));
  }
  updateCiso();
  btn.addEventListener('click', function() {
    cisoMode = !cisoMode;
    updateCiso();
    render();
  });
}

function init() {
  fetch('../data/vendors.json')
    .then(function(r){ return r.json(); })
    .then(function(data) {
      DATA = data;
      var meta = data._meta || {};
      document.getElementById('metaLine').textContent =
        'Last updated: ' + (meta.last_updated || 'N/A') +
        ' | ' + (meta.total_vendors || DATA.vendors.length) + ' vendors | Schema ' + (meta.schema_version || '1.1');
      buildFilters();
      initCiso();
      render();
    })
    .catch(function(err) {
      document.getElementById('cardGrid').innerHTML = '<div class="empty-state">Failed to load vendor data</div>';
      console.error(err);
    });
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

})();
</script>
</body>
</html>
