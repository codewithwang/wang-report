<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Wang Kitchen</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap');

  :root {
    --bg: #1a1410;
    --card: #231e18;
    --gold: #c9a84c;
    --gold-dim: #8a7235;
    --cream: #f0e6d3;
    --cream-dim: #a89880;
    --red: #8b3a3a;
    --green: #4a7a4a;
    --border: #3a3228;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--bg);
    color: var(--cream);
    min-height: 100vh;
    padding: 0 0 4rem 0;
  }

  header {
    text-align: center;
    padding: 2.5rem 1rem 1.5rem;
    border-bottom: 1px solid var(--gold-dim);
    margin-bottom: 1.5rem;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    color: var(--gold);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }

  header .subtitle {
    font-size: 0.8rem;
    color: var(--cream-dim);
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }

  .filters {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    padding: 0 1rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .filters button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--cream-dim);
    font-family: 'Lato', sans-serif;
    font-size: 0.75rem;
    padding: 0.4rem 0.9rem;
    border-radius: 2px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    transition: all 0.2s;
  }

  .filters button.active, .filters button:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(201, 168, 76, 0.08);
  }

  section {
    max-width: 600px;
    margin: 0 auto 2rem;
    padding: 0 1.2rem;
  }

  section h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0.5rem;
    margin-bottom: 0.8rem;
  }

  .item {
    padding: 0.6rem 0;
    border-bottom: 1px dotted var(--border);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 0.8rem;
    cursor: pointer;
    transition: background 0.15s;
    border-radius: 2px;
    padding-left: 0.3rem;
    padding-right: 0.3rem;
  }

  .item:hover { background: rgba(201, 168, 76, 0.04); }
  .item:last-child { border-bottom: none; }

  .item-left { flex: 1; }

  .item-name {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    color: var(--cream);
    display: inline;
  }

  .item-tag {
    font-size: 0.6rem;
    padding: 0.15rem 0.4rem;
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-left: 0.5rem;
    vertical-align: middle;
  }

  .tag-v { background: var(--green); color: #c8e6c8; }
  .tag-quick { background: #4a5a7a; color: #c8d8f0; }
  .tag-kid { background: #7a5a4a; color: #f0d8c8; }

  .item-desc {
    font-size: 0.75rem;
    color: var(--cream-dim);
    margin-top: 0.2rem;
    font-weight: 300;
  }

  .item-time {
    font-size: 0.7rem;
    color: var(--gold-dim);
    white-space: nowrap;
    font-weight: 300;
  }

  .item.selected { background: rgba(201, 168, 76, 0.1); }
  .item.selected .item-name { color: var(--gold); }

  .tonight {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--card);
    border-top: 1px solid var(--gold-dim);
    padding: 0.7rem 1.2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
  }

  .tonight-label {
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    font-size: 0.85rem;
  }

  .tonight-items {
    font-size: 0.75rem;
    color: var(--cream-dim);
    max-width: 70%;
    text-align: right;
  }

  .tonight-clear {
    background: none;
    border: none;
    color: var(--red);
    font-size: 0.7rem;
    cursor: pointer;
    padding: 0.2rem;
  }

  .hidden { display: none; }
</style>
</head>
<body>

<header>
  <h1>The Wang Kitchen</h1>
  <div class="subtitle">Family Dinner Menu</div>
</header>

<div class="filters">
  <button class="active" data-filter="all">All</button>
  <button data-filter="quick">Quick (&lt;30m)</button>
  <button data-filter="v">Vegetarian</button>
  <button data-filter="kid">Kid Friendly</button>
</div>

<main id="menu"></main>

<div class="tonight" id="tonight">
  <div>
    <span class="tonight-label">Tonight:</span>
    <button class="tonight-clear" id="clearBtn" onclick="clearSelections()">clear</button>
  </div>
  <div class="tonight-items" id="tonightItems">Tap items to plan dinner</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// MENU DATA — Edit this to add/remove/change items
// tags: v = vegetarian, quick = under 30 min, kid = kid-friendly
// ═══════════════════════════════════════════════════════════════
const MENU = {

    { name: "Bruschetta Trio", desc: "Tomato basil, mushroom truffle, ricotta honey", time: "15m", tags: ["v", "quick"] },
    { name: "Crispy Chicken Wings", desc: "Buffalo, garlic parm, or honey soy", time: "35m", tags: ["kid"] },
    { name: "Shrimp Cocktail", desc: "Poached with cocktail sauce and lemon", time: "20m", tags: ["quick"] },
    { name: "Edamame", desc: "Sea salt or garlic chili", time: "10m", tags: ["v", "quick", "kid"] },
    { name: "Caprese Salad", desc: "Fresh mozzarella, tomato, basil, balsamic", time: "10m", tags: ["v", "quick"] },
    { name: "Gyoza", desc: "Pan-fried pork and cabbage dumplings", time: "25m", tags: ["kid", "quick"] },
    { name: "Soup of the Day", desc: "Rotate: tomato bisque, corn chowder, hot & sour", time: "30m", tags: ["v"] },
  ],

  "Salads & Light": [
    { name: "Caesar Salad", desc: "Romaine, croutons, parm, anchovy dressing", time: "15m", tags: ["quick"] },
    { name: "Wedge Salad", desc: "Iceberg, blue cheese, bacon, tomato", time: "10m", tags: ["quick"] },
    { name: "Asian Slaw", desc: "Cabbage, carrot, sesame ginger dressing", time: "15m", tags: ["v", "quick"] },
    { name: "Greek Salad", desc: "Cucumber, tomato, olive, feta, oregano", time: "10m", tags: ["v", "quick"] },
  ],

  "Sides": [
    { name: "Garlic Mashed Potatoes", desc: "Yukon gold, butter, roasted garlic", time: "30m", tags: ["v", "kid"] },
    { name: "Roasted Broccolini", desc: "Lemon, chili flakes, parm", time: "20m", tags: ["v", "quick"] },
    { name: "Mac & Cheese", desc: "Three cheese with breadcrumb crust", time: "35m", tags: ["v", "kid"] },
    { name: "Grilled Asparagus", desc: "Olive oil, lemon zest", time: "15m", tags: ["v", "quick"] },
    { name: "Creamed Spinach", desc: "Classic steakhouse style", time: "20m", tags: ["v", "quick"] },
    { name: "Sweet Potato Fries", desc: "With chipotle aioli", time: "30m", tags: ["v", "kid"] },
    { name: "Fried Rice", desc: "Egg, scallion, soy — goes with everything", time: "15m", tags: ["v", "quick", "kid"] },
    { name: "Corn on the Cob", desc: "Butter, salt, or elote style", time: "15m", tags: ["v", "quick", "kid"] },
    { name: "Stir-Fried Greens", desc: "Bok choy or gai lan with garlic", time: "10m", tags: ["v", "quick"] },
  ],

  "Mains — Beef & Lamb": [
    { name: "Ribeye Steak", desc: "Cast iron seared, herb butter", time: "25m", tags: ["quick"] },
    { name: "NY Strip", desc: "Reverse sear, peppercorn sauce", time: "30m", tags: [] },
    { name: "Beef Short Ribs", desc: "Red wine braised, fall-off-bone", time: "3h", tags: [] },
    { name: "Smash Burgers", desc: "Double patty, American cheese, special sauce", time: "20m", tags: ["quick", "kid"] },
    { name: "Beef Stir-Fry", desc: "Flank steak, peppers, black bean sauce", time: "20m", tags: ["quick"] },
    { name: "Bolognese", desc: "Slow-simmered meat sauce over pappardelle", time: "2h", tags: ["kid"] },
    { name: "Korean BBQ Bulgogi", desc: "Marinated thin-sliced beef, lettuce wraps", time: "25m", tags: ["quick"] },
    { name: "Lamb Chops", desc: "Rosemary garlic, mint yogurt", time: "25m", tags: ["quick"] },
    { name: "Cottage Pie", desc: "Beef mince, veg, mashed potato top", time: "1h", tags: ["kid"] },
  ],

  "Mains — Poultry": [
    { name: "Roast Chicken", desc: "Whole spatchcocked, lemon herb", time: "1h", tags: ["kid"] },
    { name: "Chicken Parm", desc: "Breaded, marinara, mozzarella, pasta", time: "40m", tags: ["kid"] },
    { name: "Teriyaki Chicken", desc: "Glazed thighs with rice", time: "30m", tags: ["kid"] },
    { name: "Thai Green Curry", desc: "Chicken, bamboo, basil, coconut", time: "30m", tags: [] },
    { name: "Kung Pao Chicken", desc: "Peanuts, chili, Sichuan pepper", time: "25m", tags: ["quick"] },
    { name: "Chicken Caesar Wrap", desc: "Quick lunch-for-dinner option", time: "15m", tags: ["quick", "kid"] },
    { name: "Duck Breast", desc: "Pan-seared, cherry reduction", time: "30m", tags: [] },
  ],

  "Mains — Seafood": [
    { name: "Pan-Seared Salmon", desc: "Crispy skin, dill cream sauce", time: "20m", tags: ["quick"] },
    { name: "Fish Tacos", desc: "Beer-battered cod, slaw, lime crema", time: "30m", tags: ["kid"] },
    { name: "Garlic Butter Shrimp", desc: "Over linguine or with crusty bread", time: "20m", tags: ["quick"] },
    { name: "Miso Glazed Cod", desc: "Broiled with bok choy", time: "25m", tags: ["quick"] },
    { name: "Seafood Pasta", desc: "Shrimp, clams, white wine, garlic", time: "30m", tags: [] },
    { name: "Tuna Poke Bowl", desc: "Rice, avocado, edamame, spicy mayo", time: "20m", tags: ["quick"] },
  ],

  "Mains — Vegetarian": [
    { name: "Mushroom Risotto", desc: "Arborio, porcini, parm, truffle oil", time: "40m", tags: ["v"] },
    { name: "Eggplant Parm", desc: "Breaded, marinara, mozzarella", time: "45m", tags: ["v"] },
    { name: "Mapo Tofu", desc: "Silken tofu, Sichuan chili, fermented black bean", time: "20m", tags: ["v", "quick"] },
    { name: "Veggie Stir-Fry", desc: "Seasonal veg, oyster sauce, rice", time: "20m", tags: ["v", "quick", "kid"] },
    { name: "Pasta Primavera", desc: "Seasonal vegetables, light garlic olive oil", time: "25m", tags: ["v", "quick", "kid"] },
    { name: "Stuffed Bell Peppers", desc: "Rice, black beans, corn, cheese", time: "45m", tags: ["v", "kid"] },
    { name: "Dan Dan Noodles", desc: "Spicy sesame peanut sauce, veg version", time: "20m", tags: ["v", "quick"] },
  ],

  "Pasta & Comfort": [
    { name: "Carbonara", desc: "Guanciale, egg, pecorino, black pepper", time: "25m", tags: ["quick"] },
    { name: "Cacio e Pepe", desc: "Pecorino, black pepper — 3 ingredients", time: "20m", tags: ["v", "quick"] },
    { name: "Lasagna", desc: "Layers of meat, ricotta, mozzarella", time: "1.5h", tags: ["kid"] },
    { name: "Pad Thai", desc: "Rice noodles, shrimp or tofu, peanuts", time: "25m", tags: ["quick"] },
    { name: "Ramen", desc: "Tonkotsu or miso broth, soft egg, chashu", time: "30m", tags: [] },
    { name: "Fried Noodles", desc: "HK-style crispy noodles with gravy", time: "25m", tags: ["quick", "kid"] },
  ],
};

// ═══════════════════════════════════════════════════════════════
// RENDER — You shouldn't need to edit below here
// ═══════════════════════════════════════════════════════════════
let selected = JSON.parse(localStorage.getItem('wk-tonight') || '[]');
let activeFilter = 'all';

function render() {
  const menu = document.getElementById('menu');
  menu.innerHTML = '';

  for (const [section, items] of Object.entries(MENU)) {
    const filtered = items.filter(item => {
      if (activeFilter === 'all') return true;
      return item.tags.includes(activeFilter);
    });
    if (filtered.length === 0) continue;

    const sec = document.createElement('section');
    sec.innerHTML = `<h2>${section}</h2>`;

    filtered.forEach(item => {
      const isSelected = selected.includes(item.name);
      const div = document.createElement('div');
      div.className = `item${isSelected ? ' selected' : ''}`;
      div.onclick = () => toggleItem(item.name);

      let tags = '';
      if (item.tags.includes('v')) tags += '<span class="item-tag tag-v">V</span>';
      if (item.tags.includes('quick')) tags += '<span class="item-tag tag-quick">fast</span>';
      if (item.tags.includes('kid')) tags += '<span class="item-tag tag-kid">kids</span>';

      div.innerHTML = `
        <div class="item-left">
          <span class="item-name">${item.name}</span>${tags}
          <div class="item-desc">${item.desc}</div>
        </div>
        <div class="item-time">${item.time}</div>
      `;
      sec.appendChild(div);
    });

    menu.appendChild(sec);
  }

  updateTonight();
}

function toggleItem(name) {
  const i = selected.indexOf(name);
  if (i >= 0) selected.splice(i, 1);
  else selected.push(name);
  localStorage.setItem('wk-tonight', JSON.stringify(selected));
  render();
}

function clearSelections() {
  selected = [];
  localStorage.setItem('wk-tonight', '[]');
  render();
}

function updateTonight() {
  const el = document.getElementById('tonightItems');
  if (selected.length === 0) {
    el.textContent = 'Tap items to plan dinner';
  } else {
    el.textContent = selected.join(' + ');
  }
}

document.querySelectorAll('.filters button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  });
});

render();
</script>
</body>
</html>
