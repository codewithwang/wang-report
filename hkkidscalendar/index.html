<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HK Kids Calendar - Hong Kong Kids Activities &amp; Open Days</title>
<meta name="description" content="Curated calendar of kid-friendly events, open days, and activities in Hong Kong.">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fdf6ee;--card:#ffffff;--primary:#ff6b6b;--secondary:#4ecdc4;
  --accent:#ffe66d;--purple:#a78bfa;--pink:#f9a8d4;--blue:#7dd3fc;
  --text:#2d3436;--muted:#636e72;--border:#e8e0d6;--radius:16px;
}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.header{text-align:center;padding:2.5rem 1rem 1.5rem;background:linear-gradient(135deg,#fff5f5,#f0fffe,#fffbeb);position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-40px;left:-40px;width:120px;height:120px;background:var(--accent);opacity:.3;border-radius:50%}
.header::after{content:'';position:absolute;bottom:-30px;right:-20px;width:100px;height:100px;background:var(--pink);opacity:.25;border-radius:50%}
.header h1{font-size:2.2rem;font-weight:800;color:var(--primary);position:relative;z-index:1}
.header p{color:var(--muted);font-size:1rem;margin-top:.25rem;position:relative;z-index:1}
.container{max-width:860px;margin:0 auto;padding:0 1rem 3rem}
.calendar-wrap{background:var(--card);border-radius:var(--radius);padding:1.25rem;margin:1.5rem 0;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.cal-nav button{background:none;border:2px solid var(--border);border-radius:10px;width:40px;height:40px;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.cal-nav button:hover{border-color:var(--primary);color:var(--primary)}
.cal-nav h2{font-size:1.15rem;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center}
.cal-day-label{font-size:.7rem;font-weight:600;color:var(--muted);padding:4px 0;text-transform:uppercase}
.cal-day{position:relative;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:.85rem;border-radius:10px;cursor:default;font-weight:500;transition:.15s}
.cal-day.today{background:#fff3cd;font-weight:700}
.cal-day.has-event{cursor:pointer;font-weight:700}
.cal-day.has-event:hover{background:#ffeaea}
.cal-day .dot-row{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);display:flex;gap:2px}
.cal-day .dot{width:5px;height:5px;border-radius:50%}
.cal-day.selected{background:var(--primary);color:#fff}
.cal-day.selected .dot{border:1px solid #fff}
.filters{display:flex;flex-wrap:wrap;gap:8px;margin:1.25rem 0}
.filter-btn{padding:6px 14px;border-radius:20px;border:2px solid var(--border);background:var(--card);font-size:.8rem;font-weight:600;cursor:pointer;transition:.2s;font-family:inherit}
.filter-btn:hover{border-color:var(--secondary)}
.filter-btn.active{background:var(--secondary);color:#fff;border-color:var(--secondary)}
.event-list{display:flex;flex-direction:column;gap:1rem}
.event-card{background:var(--card);border-radius:var(--radius);padding:1.25rem;box-shadow:0 2px 12px rgba(0,0,0,.06);border-left:5px solid var(--secondary);transition:transform .15s,box-shadow .15s}
.event-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.1)}
.event-card[data-cat="Government Open Day"]{border-left-color:var(--primary)}
.event-card[data-cat="Transport Experience"]{border-left-color:var(--accent)}
.event-card[data-cat="Arts \26 Culture"]{border-left-color:var(--purple)}
.event-card[data-cat="Museum"]{border-left-color:var(--blue)}
.event-card[data-cat="Baby \26 Toddler"]{border-left-color:var(--pink)}
.event-card[data-cat="Indoor Playground"]{border-left-color:var(--secondary)}
.event-card[data-cat="Outdoor Playground"]{border-left-color:#6bcb77}
.event-card[data-cat="Arts \26 Crafts"]{border-left-color:#e8a87c}
.event-card[data-cat="Seasonal Event"]{border-left-color:#ff9a9e}
.ev-header{display:flex;align-items:flex-start;gap:.75rem;margin-bottom:.5rem}
.ev-emoji{font-size:2rem;line-height:1}
.ev-title{font-size:1.1rem;font-weight:700}
.ev-meta{display:flex;flex-wrap:wrap;gap:.5rem .75rem;margin:.5rem 0;font-size:.82rem;color:var(--muted)}
.ev-meta span{display:flex;align-items:center;gap:4px}
.ev-desc{font-size:.9rem;margin:.5rem 0;color:#444}
.ev-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:.65rem}
.ev-tag{font-size:.72rem;padding:3px 10px;border-radius:12px;font-weight:600}
.ev-tag.cost-free{background:#d1fae5;color:#065f46}
.ev-tag.cost-paid{background:#fef3c7;color:#92400e}
.ev-tag.cat{background:#ede9fe;color:#5b21b6}
.ev-reg{font-size:.82rem;color:var(--muted);margin-top:.5rem;padding-top:.5rem;border-top:1px dashed var(--border)}
.no-events{text-align:center;padding:2rem;color:var(--muted);font-size:.95rem}
.footer{text-align:center;padding:2rem 1rem;color:var(--muted);font-size:.82rem}
.footer a{color:var(--primary);text-decoration:none;font-weight:600}
@media(max-width:500px){
  .header h1{font-size:1.6rem}
  .cal-day{font-size:.75rem}
  .ev-emoji{font-size:1.5rem}
  .ev-title{font-size:1rem}
}
</style>
</head>

var MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
var DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
var CAT_COLORS={"Government Open Day":"#ff6b6b","Transport Experience":"#ffe66d","Arts & Culture":"#a78bfa","Museum":"#7dd3fc","Baby & Toddler":"#f9a8d4","Indoor Playground":"#4ecdc4","Outdoor Playground":"#6bcb77","Arts & Crafts":"#e8a87c","Seasonal Event":"#ff9a9e"};
var curYear=2026,curMonth=3,activeFilter="All",selectedDay=null;

function pad(n){return n<10?"0"+n:""+n}
function dateStr(y,m,d){return y+"-"+pad(m+1)+"-"+pad(d)}
function eventsOnDate(y,m,d){var ds=dateStr(y,m,d);return events.filter(function(e){return e.endDate?ds>=e.startDate&&ds<=e.endDate:ds===e.startDate})}
function catSet(evs){var s={};evs.forEach(function(e){s[e.category]=1});return Object.keys(s)}
function fmtDate(ds){var d=new Date(ds+"T00:00:00");return d.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})}

function renderCalendar(){
  var g=document.getElementById("calGrid"),t=document.getElementById("calTitle");
  t.textContent=MONTHS[curMonth]+" "+curYear;
  var h=DAYS.map(function(d){return'<div class="cal-day-label">'+d+"</div>"}).join("");
  var f=new Date(curYear,curMonth,1).getDay(),dim=new Date(curYear,curMonth+1,0).getDate(),now=new Date();
  for(var i=0;i<f;i++)h+='<div class="cal-day empty"></div>';
  for(var d=1;d<=dim;d++){
    var ev=eventsOnDate(curYear,curMonth,d),isT=now.getFullYear()===curYear&&now.getMonth()===curMonth&&now.getDate()===d;
    var c="cal-day";if(isT)c+=" today";if(ev.length)c+=" has-event";if(selectedDay===d)c+=" selected";
    var dots="";
    if(ev.length){var cats=catSet(ev);dots='<span class="dot-row">'+cats.slice(0,4).map(function(k){return'<span class="dot" style="background:'+(CAT_COLORS[k]||"#ccc")+'"></span>'}).join("")+"</span>"}
    h+='<div class="'+c+'" data-day="'+d+'">'+d+dots+"</div>"
  }
  g.innerHTML=h;
  g.querySelectorAll(".has-event").forEach(function(el){
    el.addEventListener("click",function(){selectedDay=parseInt(el.dataset.day);renderCalendar();renderEvents();var fc=document.querySelector(".event-card");if(fc)fc.scrollIntoView({behavior:"smooth",block:"start"})})
  })
}

var AGE_LABELS={"0-3":"\uD83C\uDF7C 0\u20133 yrs","3-6":"\uD83E\uDDD2 3\u20136 yrs","6-12":"\uD83C\uDF92 6\u201312 yrs"};
var activeAge="All";
function renderFilters(){
var cats=["All"].concat(Object.keys(CAT_COLORS)),w=document.getElementById("filters");
  var ageHtml='<div style="display:flex;gap:6px;width:100%;margin-bottom:4px"><span style="font-size:11px;font-weight:700;color:var(--muted);padding:6px 0">Age:</span>'+["All","0-3","3-6","6-12"].map(function(a){return'<button class="filter-btn'+(activeAge===a?" active":"")+'" data-age="'+a+'">'+(a==="All"?"All Ages":(AGE_LABELS[a]||a))+"</button>"}).join("")+"</div>";
w.innerHTML=ageHtml+cats.map(function(c){return'<button class="filter-btn'+(activeFilter===c?" active":"")+'" data-cat="'+c+'">'+c+"</button>"}).join("");
w.querySelectorAll("[data-age]").forEach(function(b){b.addEventListener("click",function(){activeAge=b.dataset.age;selectedDay=null;renderCalendar();renderFilters();renderEvents()})});
  w.querySelectorAll("[data-cat]").forEach(function(b){b.addEventListener("click",function(){activeFilter=b.dataset.cat;selectedDay=null;renderCalendar();renderFilters();renderEvents()})})
}

function renderEvents(){
  var list=document.getElementById("eventList"),filtered=events.slice();
  if(selectedDay){var ds=dateStr(curYear,curMonth,selectedDay);filtered=events.filter(function(e){return e.endDate?ds>=e.startDate&&ds<=e.endDate:ds===e.startDate})}
  if(activeFilter!=="All")filtered=filtered.filter(function(e){return e.category===activeFilter});
if(activeAge!=="All")filtered=filtered.filter(function(e){return e.ages&&e.ages.indexOf(activeAge)!==-1});
  filtered.sort(function(a,b){return a.startDate.localeCompare(b.startDate)});
  if(!filtered.length){list.innerHTML='<div class="no-events">No events found for this selection.</div>';return}
  list.innerHTML=filtered.map(function(e){
    var cc=e.cost==="Free"?"cost-free":"cost-paid";
    var dd=e.endDate&&e.endDate!==e.startDate?fmtDate(e.startDate)+" \u2013 "+fmtDate(e.endDate):fmtDate(e.startDate);
    return'<article class="event-card" data-cat="'+e.category+'">'
    +'<div class="ev-header"><span class="ev-emoji">'+e.emoji+'</span><div><div class="ev-title">'+e.title+'</div></div></div>'
    +'<div class="ev-meta"><span>\uD83D\uDCC5 '+dd+'</span><span>\uD83D\uDD50 '+e.time+'</span><span>\uD83D\uDCCD '+e.location+'</span></div>'
    +'<p class="ev-desc">'+e.description+'</p>'
    +'<div class="ev-tags"><span class="ev-tag '+cc+'">'+e.cost+'</span><span class="ev-tag cat">'+e.category+'</span>'+(e.ages?e.ages.split(" ").map(function(a){return'<span class="ev-tag" style="background:#f0f4ff;color:#3b5998;font-size:10px">'+(AGE_LABELS[a]||a)+'</span>'}).join(""):'')+'</div>'
    +'<div class="ev-reg">\uD83D\uDCDD '+e.registration+'</div>'
    +(e.url?'<div style="margin-top:10px"><a href="'+e.url+'" target="_blank" rel="noopener" style="display:inline-block;padding:8px 20px;background:var(--primary);color:#fff;border-radius:12px;text-decoration:none;font-size:13px;font-weight:700;transition:opacity .2s" onmouseover="this.style.opacity=0.85" onmouseout="this.style.opacity=1">\uD83C\uDFAB Official Website &rarr;</a></div>':'')
    +'</article>'
  }).join("")
}

document.getElementById("refreshDate").textContent="3 April 2026 \u2014 19 events";
renderCalendar();renderFilters();renderEvents();
document.getElementById("prevMonth").addEventListener("click",function(){curMonth--;if(curMonth<0){curMonth=11;curYear--}selectedDay=null;renderCalendar();renderEvents()});
document.getElementById("nextMonth").addEventListener("click",function(){curMonth++;if(curMonth>11){curMonth=0;curYear++}selectedDay=null;renderCalendar();renderEvents()});
</script>
