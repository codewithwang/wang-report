<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fffff8;--text:#1a1a1a;--link:#0645ad;--visited:#663366;
  --meta:#666;--dim:#999;--border:#ccc;--rule:#e0e0d8;--mono:'Courier New',Courier,monospace;
}
html,body{background:var(--bg);color:var(--text);font-family:Georgia,'Times New Roman',serif;font-size:14px;line-height:1.65}
body{max-width:820px;margin:0 auto;padding:16px 18px 80px}
a{color:var(--link);text-decoration:underline}
a:visited{color:var(--visited)}
a:hover{text-decoration:none}

/* ── masthead ── */
.masthead{border-bottom:3px double #1a1a1a;padding-bottom:8px;margin-bottom:12px}
.site-title{font-family:var(--mono);font-size:clamp(18px,4vw,26px);font-weight:bold;letter-spacing:1px;text-transform:uppercase}
.site-sub{font-family:var(--mono);font-size:11px;color:var(--meta);text-transform:uppercase;letter-spacing:2px;margin-top:2px}
.masthead-row{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:6px}
.site-meta{font-family:var(--mono);font-size:11px;color:var(--meta)}
.refresh-btn{font-family:var(--mono);font-size:11px;background:none;border:1px solid var(--border);color:var(--link);cursor:pointer;padding:2px 8px}
.refresh-btn:hover{background:#f0f0e8}

/* ── filters ── */
.filter-bar{font-family:var(--mono);font-size:12px;margin:10px 0 14px;border-bottom:1px solid var(--rule);padding-bottom:8px;line-height:1.8}
.filter-bar span{color:var(--meta);margin-right:4px}
.f-btn{display:inline;background:none;border:none;font:inherit;cursor:pointer;color:var(--link);padding:0;margin:0 4px 0 0;text-decoration:underline}
.f-btn::before{content:'['}
.f-btn::after{content:']'}
.f-btn.active{color:#1a1a1a;font-weight:bold;text-decoration:none}
.f-btn:hover{color:#333}
#count-line{font-family:var(--mono);font-size:11px;color:var(--meta);margin-bottom:10px}

/* ── week headers ── */
.week-header{font-family:var(--mono);font-size:12px;font-weight:bold;text-transform:uppercase;letter-spacing:1px;color:#333;
  border-top:1px solid var(--border);margin:18px 0 8px;padding-top:6px}

/* ── event rows ── */
.event-row{padding:8px 0 8px 0;border-bottom:1px dotted var(--rule)}
.event-row.past{opacity:0.45}
.event-row.hidden{display:none}
.event-meta{font-family:var(--mono);font-size:11px;color:var(--meta);margin-bottom:2px}
.event-cat{text-transform:lowercase;margin-right:8px}
.event-title{font-size:14px;font-weight:bold;line-height:1.4}
.event-title a{color:var(--text);text-decoration:none}
.event-title a:visited{color:#333}
.event-title a:hover{color:var(--link);text-decoration:underline}
.event-venue{font-size:13px;color:var(--meta);margin-top:1px}
.event-cost{font-family:var(--mono);font-size:11px;color:#555;margin-left:8px}
.event-desc{font-size:13px;color:#333;margin-top:3px;line-height:1.5}
.event-reg{font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:2px}
.event-link{font-family:var(--mono);font-size:11px;margin-top:3px}
.event-link a::before{content:'→ '}

/* ── always on ── */
.always-on{margin-top:28px}
.ao-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:0}
.ao-item{padding:8px 12px 8px 0;border-bottom:1px dotted var(--rule)}
.ao-cat{font-family:var(--mono);font-size:10px;text-transform:lowercase;color:var(--meta)}
.ao-title{font-weight:bold;font-size:13px}
.ao-title a{color:var(--text);text-decoration:none}
.ao-title a:hover{color:var(--link);text-decoration:underline}
.ao-location{font-size:12px;color:var(--meta)}
.ao-desc{font-size:12px;color:#444;margin-top:2px;line-height:1.45}
.ao-cost{font-family:var(--mono);font-size:11px;color:#555}

/* ── mini calendar ── */
.cal-wrap{font-family:var(--mono);font-size:12px;border:1px solid var(--border);display:inline-block;padding:8px 10px;margin-bottom:14px;background:#fffff8}
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.cal-nav-btn{background:none;border:none;font:inherit;cursor:pointer;color:var(--link);padding:0 4px;font-size:13px}
.cal-nav-btn:hover{color:#333}
.cal-month-label{font-weight:bold;text-transform:uppercase;letter-spacing:1px;font-size:11px}
.cal-grid{display:grid;grid-template-columns:repeat(7,28px);gap:1px 0}
.cal-dh{text-align:center;color:var(--meta);font-size:10px;padding:2px 0}
.cal-cell{width:28px;height:22px;text-align:center;line-height:22px;cursor:default;color:var(--meta);font-size:11px}
.cal-cell.has-events{color:var(--text);cursor:pointer;text-decoration:underline;font-weight:bold}
.cal-cell.has-events:hover{color:var(--link)}
.cal-cell.today{background:#1a1a1a;color:#fffff8}
.cal-cell.today.has-events{background:#1a1a1a;color:#fffff8}
.cal-cell.selected{background:var(--link);color:#fff}
.cal-cell.selected.today{background:var(--link);color:#fff}
.cal-clear{font-size:10px;color:var(--link);cursor:pointer;text-decoration:underline;text-align:right;margin-top:3px;display:none}
.cal-clear.visible{display:block}

/* ── footer ── */
.footer{margin-top:32px;padding-top:10px;border-top:1px solid var(--border);font-family:var(--mono);font-size:11px;color:var(--meta)}
.footer a{color:var(--meta)}
.no-events{font-family:var(--mono);font-size:13px;color:var(--meta);padding:20px 0;text-align:center}
@media(max-width:480px){body{padding:12px 12px 60px}.site-title{font-size:16px}}
</style>
</head>

const ALWAYS_ON = [{"title":"TakeOut Comedy Club","location":"34 Wyndham St, Central","description":"HK's main English-language stand-up venue. Fri & Sat nights, occasional weeknights. Book ahead — sells out.","cost":"From HK$200","url":"https://takeoutcomedy.com/","category":"Comedy","recurringDays":[5,6]},{"title":"Peel Fresco Music Bar","location":"Peel St, Central","description":"Live jazz from ~9pm nightly. No cover. One of the few places in Central with actual live music on a weeknight.","cost":"Drinks only","url":"https://www.peelfresco.com.hk/","category":"Nightlife","recurringDays":[0,1,2,3,4,5,6]},{"title":"The Wanch","location":"Wan Chai","description":"Long-running Wan Chai pub. Live music nightly. Old-school HK dive-bar energy. No cover.","cost":"Drinks only","url":"http://www.thewanch.com/","category":"Nightlife","recurringDays":[0,1,2,3,4,5,6]},{"title":"Witty Otter Board Game Cafe","location":"Jordan + Wan Chai","description":"500+ board games. Seat fee covers all games. Food and drinks available. Walk-in or book for groups.","cost":"From HK$80/hr seat","url":"https://www.wittyotter.com/","category":"Social","recurringDays":[0,1,2,3,4,5,6]},{"title":"LCSD Sports Halls & Courts","location":"Citywide","description":"Badminton, squash, table tennis, swimming — bookable via LCSD app 7 days in advance. Cheapest courts in town.","cost":"From HK$19/hr","url":"https://www.lcsd.gov.hk/en/sport/","category":"Fitness","recurringDays":[0,1,2,3,4,5,6]},{"title":"HK Trail (Section 1–8)","location":"Peak → Big Wave Bay","description":"50km cross-island trail. Accessible from multiple MTR stations. Section 1 from The Peak: zero cost, killer views.","cost":"Free","url":"https://www.hikingtrailshk.com/hong-kong-trail/","category":"Sports","recurringDays":[0,6]},{"title":"M+ Museum","location":"West Kowloon","description":"Visual culture museum. Rotating exhibitions and a permanent collection. Check online for current shows.","cost":"HK$120 / HK$60 concession","url":"https://www.mplus.org.hk/","category":"Arts & Culture","recurringDays":[0,2,3,4,5,6]}];
const TODAY = new Date().toISOString().slice(0,10);

function fmt(d){
  if(!d) return '';
  const [y,m,day]=d.split('-');
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[+m-1]+' '+parseInt(day);
}

function fmtRange(s,e){
  if(!e||e===s) return fmt(s);
  const [sy,sm]=s.split('-'), [ey,em]=e.split('-');
  if(sm===em) return fmt(s)+'–'+parseInt(e.split('-')[2]);
  return fmt(s)+'–'+fmt(e);
}

function weekLabel(date){
  const d=new Date(date+'T00:00:00');
  const t=new Date(TODAY+'T00:00:00');
  const diff=Math.floor((d-t)/(86400000));
  if(diff<0) return 'Past';
  if(diff<7) return 'This week';
  if(diff<14) return 'Next week';
  if(diff<21) return 'In 2 weeks';
  if(diff<35) return 'In 3–4 weeks';
  return 'Later';
}

const WEEK_ORDER=['This week','Next week','In 2 weeks','In 3–4 weeks','Later','Past'];

let activeCat='all';
let activeDate=null; // YYYY-MM-DD or null

// ── Mini Calendar ─────────────────────────────────────────────────────────────
const DAYS=['Mo','Tu','We','Th','Fr','Sa','Su'];
let calYear=new Date().getFullYear();
let calMonth=new Date().getMonth();

function eventDatesSet(){
  const s=new Set();
  // One-off events
  EVENTS.forEach(e=>{
    if(!e.startDate) return;
    const start=new Date(e.startDate+'T00:00:00');
    const end=e.endDate?new Date(e.endDate+'T00:00:00'):start;
    for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)) s.add(d.toISOString().slice(0,10));
  });
  // Recurring ALWAYS_ON venues: mark every matching weekday in horizon
  const horizon=new Date(TODAY+'T00:00:00');
  horizon.setDate(horizon.getDate()+56);
  ALWAYS_ON.forEach(a=>{
    if(!a.recurringDays||!a.recurringDays.length) return;
    const cur=new Date(TODAY+'T00:00:00');
    while(cur<=horizon){
      if(a.recurringDays.includes(cur.getDay())) s.add(cur.toISOString().slice(0,10));
      cur.setDate(cur.getDate()+1);
    }
  });
  return s;
}

function renderCal(){
  const evtDates=eventDatesSet();
  const label=new Date(calYear,calMonth,1).toLocaleString('en-GB',{month:'long',year:'numeric'});
  document.getElementById('cal-label').textContent=label.toUpperCase();
  const grid=document.getElementById('cal-grid');
  let html='';
  DAYS.forEach(d=>{ html+='<div class="cal-dh">'+d+'</div>'; });
  const firstDay=new Date(calYear,calMonth,1);
  // Monday-based offset (0=Mon … 6=Sun)
  let startOffset=(firstDay.getDay()+6)%7;
  for(let i=0;i<startOffset;i++) html+='<div class="cal-cell"></div>';
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  for(let day=1;day<=daysInMonth;day++){
    const ds=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    const isToday=ds===TODAY;
    const hasEvt=evtDates.has(ds);
    const isSel=ds===activeDate;
    let cls='cal-cell';
    if(hasEvt) cls+=' has-events';
    if(isToday) cls+=' today';
    if(isSel) cls+=' selected';
    if(hasEvt) html+='<div class="'+cls+'" data-date="'+ds+'">'+day+'</div>';
    else html+='<div class="'+cls+'">'+day+'</div>';
  }
  grid.innerHTML=html;
  grid.querySelectorAll('.cal-cell.has-events').forEach(cell=>{
    cell.addEventListener('click',function(){
      const d=this.dataset.date;
      if(activeDate===d){ activeDate=null; }
      else { activeDate=d; }
      renderCal();
      render();
      document.getElementById('cal-clear').className='cal-clear'+(activeDate?' visible':'');
    });
  });
}

document.getElementById('cal-prev').addEventListener('click',function(){
  calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCal();
});
document.getElementById('cal-next').addEventListener('click',function(){
  calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCal();
});
document.getElementById('cal-clear').addEventListener('click',function(){
  activeDate=null; renderCal(); render();
  this.className='cal-clear';
});
renderCal();
// ─────────────────────────────────────────────────────────────────────────────

function render(){
  const filtered=EVENTS.filter(e=>{
    if(activeCat!=='all'&&e.category!==activeCat) return false;
    if(activeDate){
      const end=e.endDate||e.startDate;
      if(activeDate<e.startDate||activeDate>end) return false;
    }
    return true;
  });

  // When a date is selected, synthesise recurring ALWAYS_ON entries for that weekday
  if(activeDate){
    const dow=new Date(activeDate+'T00:00:00').getDay();
    ALWAYS_ON.forEach(a=>{
      if(!a.recurringDays||!a.recurringDays.includes(dow)) return;
      if(activeCat!=='all'&&a.category!==activeCat) return;
      filtered.push({
        title: a.title,
        startDate: activeDate,
        endDate: null,
        time: 'Recurring',
        location: a.location,
        description: a.description,
        cost: a.cost,
        registration: 'Walk-in / check website',
        category: a.category,
        url: a.url,
        _recurring: true,
      });
    });
    // Hide the static always-on section when date is selected
    document.querySelector('.always-on').style.display='none';
  } else {
    document.querySelector('.always-on').style.display='';
  }

  // Sort: upcoming first (by startDate), past last
  filtered.sort((a,b)=>{
    const ap=a.startDate<TODAY, bp=b.startDate<TODAY;
    if(ap!==bp) return ap?1:-1;
    return a.startDate.localeCompare(b.startDate);
  });

  // Group by week label
  const groups={};
  for(const e of filtered){
    const wl=weekLabel(e.startDate);
    if(!groups[wl]) groups[wl]=[];
    groups[wl].push(e);
  }

  const upcoming=filtered.filter(e=>(e.endDate||e.startDate)>=TODAY);
  document.getElementById('count-line').textContent=
    upcoming.length+' event'+(upcoming.length!==1?'s':'')+' shown'+(activeCat!=='all'?' in '+activeCat:'');

  let html='';
  for(const wk of WEEK_ORDER){
    const grp=groups[wk];
    if(!grp||grp.length===0) continue;
    // Format week header with date range
    const firstDate=grp[0].startDate;
    const lastDate=grp[grp.length-1].startDate;
    let weekRange='';
    if(firstDate!==lastDate) weekRange=' · '+fmt(firstDate)+'–'+fmt(lastDate);
    html+='<div class="week-header">─── '+wk.toUpperCase()+weekRange+' ─────────────────────────</div>';
    for(const e of grp){
      const isPast=(e.endDate||e.startDate)<TODAY;
      const cat=(e.category||'').toLowerCase();
      const dateStr=fmtRange(e.startDate,e.endDate);
      const timeStr=e.time&&e.time!=='Various'&&e.time!=='All day'?' · '+e.time:'';
      const safeUrl=(e.url||'').replace(/&amp;/g,'&');
      html+='<div class="event-row'+(isPast?' past':'')+'">';
      const recurTag=e._recurring?' <span style="font-family:var(--mono);font-size:10px;color:var(--dim);border:1px solid var(--rule);padding:0 3px">recurring</span>':'';
      html+='<div class="event-meta"><span class="event-cat">'+esc(cat)+'</span><span>'+esc(dateStr)+timeStr+'</span>'+recurTag+'</div>';
      html+='<div class="event-title">'+(safeUrl?'<a href="'+esc(safeUrl)+'" target="_blank">'+esc(e.title)+'</a>':esc(e.title))+'</div>';
      html+='<div class="event-venue">'+esc(e.location||'')+'<span class="event-cost">'+esc(e.cost||'')+'</span></div>';
      if(e.description) html+='<div class="event-desc">'+esc(e.description)+'</div>';
      if(e.registration&&e.registration!=='Check website') html+='<div class="event-reg">'+esc(e.registration)+'</div>';
      html+='</div>';
    }
  }

  if(html==='') html='<div class="no-events">No events found for this filter.</div>';
  document.getElementById('events-list').innerHTML=html;

  // Always On
  let aoHtml='';
  const aoFiltered=activeCat==='all'?ALWAYS_ON:ALWAYS_ON.filter(a=>a.category===activeCat);
  for(const a of aoFiltered){
    const safeUrl=(a.url||'').replace(/&amp;/g,'&');
    aoHtml+='<div class="ao-item">';
    aoHtml+='<div class="ao-cat">'+esc((a.category||'').toLowerCase())+'</div>';
    aoHtml+='<div class="ao-title">'+(safeUrl&&safeUrl!='#'?'<a href="'+esc(safeUrl)+'" target="_blank">'+esc(a.title)+'</a>':esc(a.title))+'</div>';
    aoHtml+='<div class="ao-location">'+esc(a.location||'')+'</div>';
    aoHtml+='<div class="ao-desc">'+esc(a.description||'')+'</div>';
    if(a.cost) aoHtml+='<div class="ao-cost">'+esc(a.cost)+'</div>';
    aoHtml+='</div>';
  }
  if(aoFiltered.length===0) aoHtml='<div style="font-family:monospace;font-size:12px;color:#999;padding:8px 0">No always-on venues in this category.</div>';
  document.getElementById('always-on-grid').innerHTML=aoHtml;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

document.querySelectorAll('.f-btn').forEach(btn=>{
  btn.addEventListener('click',function(){
    document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    const raw=this.dataset.cat;
    activeCat=raw.replace(/&amp;/g,'&');
    activeDate=null;
    document.getElementById('cal-clear').className='cal-clear';
    renderCal();
    render();
  });
});

render();
})();

function doRefresh(){
  document.querySelector('.refresh-btn').textContent='refreshing...';
  fetch('/api/hk-adults-calendar/refresh').then(function(){
    setTimeout(function(){location.reload();},5000);
  }).catch(function(){location.reload();});
}
</script>
